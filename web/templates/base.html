{{define "base_top"}}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/app.css">
    {{if .Dev}}
      <meta name="shareserver-env" content="dev">
      <script src="/dev/debug.js"></script>
    {{end}}
  </head>
  <body>
    <nav class="tabs">
      <a class="logo" href="/">share://</a>
      <a href="/upload">upload</a>
      <a href="/admin">admin</a>
      {{if .Admin}}
        <form method="post" action="/admin/logout">
          <input type="hidden" name="csrf" value="{{.CSRF}}">
          <button>logout</button>
        </form>
      {{end}}
    </nav>
    <main class="shell">
      {{if .Dev}}
        <section class="api-detail detail-pane" role="status">
          <h3># Dev Mode</h3>
          <p class="err">DEBUG=1 is active.</p>
          <p class="comment-text">
            # local-only mode: default admin password and ephemeral secrets may be
            allowed. Use DEBUG=0 for production.
          </p>
        </section>
      {{end}}
{{end}}

{{define "base_bottom"}}
    </main>
  </body>
</html>
{{end}}
